<!DOCTYPE html>
<html>
<head><title>Minimal Test</title></head>
<body>
  <h1>Testing LiveTopics in isolation</h1>
  <div id="output"></div>
  
  <script src="live-topics.js"></script>
  
  <script>
    const output = document.getElementById('output');
    const log = (msg) => {
      output.innerHTML += msg + '<br>';
      console.log(msg);
    };
    
    log('LiveTopics loaded: ' + (typeof LiveTopics !== 'undefined' ? 'YES' : 'NO'));
    
    if (typeof LiveTopics !== 'undefined') {
      const mockSim = {
        agents: [{ id: 1, name: 'Test', credits: 0, xp: 0, tasksDone: 0, tasksFailed: 0 }],
        totals: { tasksDone: 0, tasksFailed: 0 },
        _emit: () => {}
      };
      
      const lt = new LiveTopics(mockSim);
      log('✓ Created LiveTopics instance');
      
      const topic = lt.createTopic({
        title: 'Test',
        description: '',
        domain: 'General',
        difficulty: 0.5,
        reward: 100
      });
      
      log('✓ Created topic: ' + topic.title);
      log('Stats: ' + JSON.stringify(lt.getStats()));
    }
  </script>
</body>
</html>
