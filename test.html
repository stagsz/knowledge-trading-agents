<!DOCTYPE html>
<html>
<head>
  <title>Test</title>
</head>
<body>
  <h1>Testing if page loads...</h1>
  <script>
    console.log('Page loaded');
    window.addEventListener('error', (e) => {
      console.error('JS Error:', e.message);
      document.body.innerHTML += '<p>ERROR: ' + e.message + '</p>';
    });
  </script>
  <script src="simulation.js"></script>
  <script src="live-topics.js"></script>
  <script>
    if (window.LiveTopics) {
      document.body.innerHTML += '<p>✓ LiveTopics class loaded</p>';
    } else {
      document.body.innerHTML += '<p>✗ LiveTopics NOT found</p>';
    }
  </script>
</body>
</html>
